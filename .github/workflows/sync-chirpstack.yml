name: Sincronizar ChirpStack -> Excel

on:
  workflow_dispatch: {}
  # Una vez que probemos que todo funciona, descomentamos esto para que
  # corra solo cada 15 minutos:
  # schedule:
  #   - cron: "*/15 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install chirpstack-api requests

      - name: Sincronizar
        env:
          CHIRPSTACK_API_TOKEN: ${{ secrets.CHIRPSTACK_API_TOKEN }}
          POWER_AUTOMATE_URL: ${{ secrets.POWER_AUTOMATE_URL }}
        run: python chirpstack_excel_sync.py
