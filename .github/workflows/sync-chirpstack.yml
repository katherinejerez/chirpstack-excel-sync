name: Sincronizar ChirpStack -> Excel

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 * * * *"

# Necesario para que la Action pueda hacer commit/push del archivo estado_actual.json
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install chirpstack-api requests

      - name: Sincronizar
        env:
          CHIRPSTACK_API_TOKEN: ${{ secrets.CHIRPSTACK_API_TOKEN }}
        run: python chirpstack_excel_sync.py

      - name: Guardar estado_actual.json en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado_actual.json
          git diff --staged --quiet || git commit -m "Actualizar estado ChirpStack"
          git push
